body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#1e1e1e;

}

/* 🎒 هدر مدرسه‌ای */
header{
    background:transparent;
    color:white;
    text-align:center;
    padding:30px;
    border-bottom:3px dashed #fff;
    text-shadow:2px 2px 0px #000;
}

header h1{
    font-size:36px;
    margin:0;
}

header p{
    margin:5px 0 0;
    font-size:20px;
}

/* 🎨 کارت‌ها تبدیل به تخته‌گچی */
.container{
    max-width:850px;
    margin:auto;
    padding:20px;
}

.card{
    background:#2a2a2a; 
    border-radius:18px;
    padding:22px;
    margin-bottom:22px;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
    border:2px solid #3b3b3b;
    color:#fff; /* متن سفید */
}

/* 🎨 عنوان‌ها */
h2{
    color:#fff;
    margin-top:0;
    font-size:26px;
    text-shadow:2px 2px 0px #000;
}

/* 🔵 دکمه‌های گچی */
.button{
    display:inline-block;
    margin-top:15px;
    padding:12px 25px;
    background:rgba(255,255,255,0.1);
    color:white;
    text-decoration:none;
    border-radius:10px;
    border:2px dashed #fff;
    font-weight:bold;
    font-size:18px;
    transition:0.2s;
}

.button:hover{
    background:rgba(255,255,255,0.25);
}

/* لودر ۲۰۲۶ – یک دایره با تاب خوردن و نزدیک شدن */
#loader{
position:fixed;
top:20px;
left:20px;
z-index:9999;
display:none;
}

.elastic-dot{
width:22px;
height:22px;
background:white;
border-radius:50%;
animation:elasticMove 0.9s cubic-bezier(.68,-0.55,.27,1.55) infinite;
}
    <script>
function go(url){
    document.getElementById("loader").style.display="flex";
    setTimeout(()=>{ window.location.href=url; },600);
}
</script>
</head>
