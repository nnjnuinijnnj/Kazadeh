<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود | کازاده</title>

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#2b2b2b;
    color:white;
    font-family:'Comic Sans MS', Arial;
}

.box{

    width:320px;
    padding:30px;
    background:rgba(255,255,255,0.08);
    border:3px dashed white;
    border-radius:25px;
    text-align:center;
    backdrop-filter:blur(5px);

}

h1{
    font-size:35px;
}

input{

    width:90%;
    padding:12px;
    margin:8px;
    border-radius:15px;
    border:none;
    font-size:16px;

}

button{

    padding:12px 35px;
    border:none;
    border-radius:15px;
    background:#444;
    color:white;
    font-size:18px;
    cursor:pointer;

}

button:hover{

    background:#666;

}

</style>

</head>

<body>

<div class="box">

<h1>🏫 Kazadeh Online</h1>

<h2>ورود دانش‌آموز</h2>

<input id="email" type="email" placeholder="📧 ایمیل">

<br>

<input id="password" type="password" placeholder="🔒 پسورد">

<br><br>

<button onclick="login()">ورود</button>

<br><br>

<a href="signup.html">
<button>
ساخت حساب جدید
</button>
</a>

<p id="message"></p>

</div>


<script type="module">

import { auth } from "./firebase.js";

import { signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


window.login=function(){

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;


signInWithEmailAndPassword(auth,email,password)

.then(()=>{

document.getElementById("message").innerHTML=
"✅ خوش آمدید به کازاده";

let audio = new Audio("welcome.mp3");
audio.play();

setTimeout(()=>{
    window.location.href="doc.html";
},1500);

})


.catch((error)=>{

document.getElementById("message").innerHTML=
"❌ ایمیل یا پسورد اشتباه است";

});


}

</script>


</body>
</html>
